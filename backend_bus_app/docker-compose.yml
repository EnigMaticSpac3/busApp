services:
  api:
    build: .
    container_name: bus_tracker_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    # depends_on:
    #   db:
    #     condition: service_healthy
    networks:
      - backend_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ruta"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

